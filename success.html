<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent - The Global Ministry of Jesus Christ Inc</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ivory: #FDFBF7;
            --soft-gold: #D4AF37;
            --rich-burgundy: #5C1F33;
            --deep-navy: #1A2332;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Pro', serif;
            background: linear-gradient(135deg, rgba(92, 31, 51, 0.05) 0%, rgba(212, 175, 55, 0.08) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--deep-navy);
        }

        .success-container {
            text-align: center;
            padding: 3rem;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        .success-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 2.5rem;
            color: var(--rich-burgundy);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        p {
            font-size: 1.2rem;
            color: var(--deep-navy);
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .btn-home {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--rich-burgundy);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: var(--deep-navy);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✅</div>
        <h1>Message Sent Successfully!</h1>
        <p>Thank you for reaching out to us. We have received your message and will get back to you as soon as possible. God bless you!</p>
        <a href="https://tgmjhc.github.io/tgmjhc/" class="btn-home">Return to Home</a>
    </div>
</body>
</html>
